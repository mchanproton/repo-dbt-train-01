semantic_models:
  - name: sfdc_opportunity
    defaults:
      agg_time_dimension: close_date
    description: >
      Fact model for SFDC Opportunities. One row per opportunity.
    model: ref('t3_sfdc_opportunity')

    entities:
      - name: opportunity
        type: primary
        expr: opportunity_id
      - name: account
        type: foreign
        expr: account_id

    dimensions:
      - name: close_date
        type: time
        type_params:
          time_granularity: day
      - name: stage_name
        type: categorical
      - name: pipeline_stage_group
        type: categorical

    measures:
      - name: total_amount
        description: Sum of all opportunity amounts
        agg: sum
        expr: amount

metrics:
  - name: total_pipeline_amount
    description: Total dollar value across all opportunities
    type: simple
    type_params:
      measure: total_amount